<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - EclipX MC Store</title>
  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="stylesheet" href="assets/css/admin.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons@2.44.0/tabler-icons.min.css">
</head>
<body class="admin-body">
  <div id="loginScreen" class="admin-login-screen">
    <div class="admin-login-card">
      <img src="assets/images/logo.png" alt="Logo" class="admin-logo">
      <h2>Admin Login</h2>
      <form id="loginForm" class="admin-login-form">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="username" placeholder="Enter username" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn-primary btn-block">
          <i class="ti ti-login"></i> Login
        </button>
        <p id="loginError" class="error-message"></p>
      </form>
    </div>
  </div>

  <div id="adminDashboard" class="admin-dashboard" style="display: none;">
    <aside class="admin-sidebar">
      <div class="admin-sidebar-header">
        <img src="assets/images/logo.png" alt="Logo">
        <h3>Admin Panel</h3>
      </div>
      <nav class="admin-nav">
        <button class="nav-item active" data-tab="coins">
          <i class="ti ti-coin"></i> Coin Packages
        </button>
        <button class="nav-item" data-tab="ranks">
          <i class="ti ti-award"></i> Ranks
        </button>
      </nav>
      <div class="admin-sidebar-footer">
        <button id="logoutBtn" class="btn-logout">
          <i class="ti ti-logout"></i> Logout
        </button>
      </div>
    </aside>

    <main class="admin-main">
      <header class="admin-header">
        <h2 id="tabTitle">Coin Packages</h2>
        <button id="addNewBtn" class="btn-primary">
          <i class="ti ti-plus"></i> Add New
        </button>
      </header>

      <div class="admin-content">
        <div id="coinsTab" class="tab-content active">
          <div class="admin-table-wrapper">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>Package Name</th>
                  <th>Coins</th>
                  <th>Price</th>
                  <th>Gamemode</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="coinsTableBody"></tbody>
            </table>
          </div>
        </div>

        <div id="ranksTab" class="tab-content">
          <div class="admin-table-wrapper">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>Rank Name</th>
                  <th>Price</th>
                  <th>Duration</th>
                  <th>Badge Color</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="ranksTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div id="modal" class="admin-modal">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle">Add New</h3>
        <button class="modal-close" id="closeModal">&times;</button>
      </div>
      <form id="itemForm" class="admin-form">
        <div id="formFields"></div>
        <div class="modal-actions">
          <button type="submit" class="btn-primary">Save</button>
          <button type="button" class="btn-cancel" id="cancelModal">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="assets/js/admin.js"></script>
</body>
</html>
